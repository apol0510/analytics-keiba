name: Import JRA Live Results (Dispatch)

# repository_dispatch (jra-live-results-updated) を keiba-data-shared-admin から受信し、
# keiba-data-shared/jra/live-results/YYYY/MM/YYYY-MM-DD.json を取り込む。
# 速報結果用 workflow (確定データ用 import-results-jra.yml とは分離)。

on:
  repository_dispatch:
    types: [jra-live-results-updated]
  workflow_dispatch:
    inputs:
      date:
        description: '日付 (YYYY-MM-DD)'
        required: false
        default: ''

# 並行実行制御:
# live-results は per-date file (jraLiveResults/YYYY-MM-DD.json) なので
# archiveResultsJra.json への書き込みは無く、archive-jra-update group とは別管理。
# 同一 date の重複起動だけ抑止する。
concurrency:
  group: jra-live-results-${{ github.event.client_payload.date || github.event.inputs.date || 'unknown' }}
  cancel-in-progress: false

jobs:
  import-live-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: astro-site

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'astro-site/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Import JRA live-results from keiba-data-shared
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_DATE: ${{ github.event.inputs.date }}
          DATE_SINGLE: ${{ github.event.client_payload.date }}
        run: |
          # 優先順位: 手動入力 > repository_dispatch payload > 今日の日付(JST)
          if [ -n "$MANUAL_DATE" ]; then
            echo "📅 Manual JRA live-results import for: $MANUAL_DATE"
            npm run import:live-results:jra -- --date="$MANUAL_DATE"
          elif [ -n "$DATE_SINGLE" ] && [ "$DATE_SINGLE" != "null" ]; then
            echo "📅 Importing JRA live-results from dispatch for: $DATE_SINGLE"
            npm run import:live-results:jra -- --date="$DATE_SINGLE"
          else
            TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            echo "📅 Importing JRA live-results for today (JST): $TODAY"
            npm run import:live-results:jra -- --date="$TODAY"
          fi

      - name: Check for changes
        id: git-check
        run: |
          # ディレクトリが存在しない場合は live 不要 (確定データ済み or 初期化前) として扱う。
          # import script が確定データありで live を意図的に削除すると、その削除が
          # 既に main に反映されている状態で次回起動するとディレクトリ自体が無い。
          if [ ! -d src/data/jraLiveResults ]; then
            echo "ℹ️ src/data/jraLiveResults 不在 → 変更なし扱い (live不要 or 確定済み)"
            exit 0
          fi
          # -A で削除も含めて全変更を検知
          git add -A src/data/jraLiveResults/
          if git diff --staged --quiet -- src/data/jraLiveResults/; then
            echo "ℹ️ src/data/jraLiveResults/ に差分なし"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        env:
          MANUAL_DATE: ${{ github.event.inputs.date }}
          DATE_SINGLE: ${{ github.event.client_payload.date }}
          SOURCE: ${{ github.event.client_payload.source }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [ -n "$MANUAL_DATE" ]; then
            COMMIT_MSG="📡 ${MANUAL_DATE} JRA速報結果取込 (manual)"
          elif [ -n "$DATE_SINGLE" ] && [ "$DATE_SINGLE" != "null" ]; then
            COMMIT_MSG="📡 ${DATE_SINGLE} JRA速報結果取込 from ${SOURCE:-dispatch}"
          else
            TODAY=$(TZ=Asia/Tokyo date +%Y-%m-%d)
            COMMIT_MSG="📡 ${TODAY} JRA速報結果取込 (auto)"
          fi

          git commit -m "$COMMIT_MSG

          🤖 Generated with [Claude Code](https://claude.com/claude-code)

          Co-Authored-By: Claude <noreply@anthropic.com>"

          # rebase で main と同期しつつ push
          for i in 1 2 3; do
            git pull --rebase origin main || git rebase --abort || true
            if git push origin HEAD:main; then
              echo "✅ push 成功 (attempt $i)"
              exit 0
            fi
            echo "⚠️ push 失敗 (attempt $i) → retry"
            sleep 5
          done
          echo "❌ push を 3回 retry しても失敗"
          exit 1

      - name: No changes
        if: steps.git-check.outputs.changed != 'true'
        run: echo "ℹ️ src/data/jraLiveResults/ に変更なし (確定データ済み or データ未取得)"
