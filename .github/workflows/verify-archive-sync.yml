name: Verify Archive Sync (Daily)

on:
  schedule:
    # 毎日 0:00 JST (15:00 UTC 前日) に実行
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  verify-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout keiba-intelligence
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check JRA archive sync
        id: check-jra
        run: |
          # 過去7日間の日付をチェック
          MISSING_DATES=""
          NO_RESULTS_DATES=""
          ALERT_NEEDED=false
          NO_RESULTS_ALERT=false

          for i in {0..6}; do
            DATE=$(date -u -d "$i days ago" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d)
            YEAR=${DATE:0:4}
            MONTH=${DATE:5:2}

            echo "━━━ Checking: $DATE ━━━"

            # 予想データがあるかチェック
            PREDICTION_URL="https://raw.githubusercontent.com/apol0510/keiba-data-shared/main/jra/predictions/$YEAR/$MONTH/$DATE.json"
            HAS_PREDICTION=false

            if curl -sf "$PREDICTION_URL" > /dev/null; then
              echo "✅ Prediction: Found"
              HAS_PREDICTION=true
            else
              echo "⏭️  Prediction: Not found"
            fi

            # 結果データがあるかチェック
            RESULT_URL="https://raw.githubusercontent.com/apol0510/keiba-data-shared/main/jra/results/$YEAR/$MONTH/$DATE.json"

            if curl -sf "$RESULT_URL" > /tmp/result.json; then
              RACE_COUNT=$(cat /tmp/result.json | jq -r '.races | length')
              echo "✅ Results: $RACE_COUNT races"

              # 10レース以上ある場合のみチェック
              if [ "$RACE_COUNT" -ge 10 ]; then
                # keiba-intelligenceのアーカイブにあるかチェック
                if grep -q "\"date\": \"$DATE\"" astro-site/src/data/archiveResultsJra.json; then
                  echo "✅ Archive: Found"
                else
                  echo "❌ Archive: MISSING!"
                  MISSING_DATES="${MISSING_DATES}${DATE} (${RACE_COUNT}R), "
                  ALERT_NEEDED=true
                fi
              else
                echo "⏭️  Skipped: $RACE_COUNT races (< 10)"
              fi
            else
              echo "⏭️  Results: Not found"

              # 予想データがあるのに結果データがない → アラート
              if [ "$HAS_PREDICTION" = true ]; then
                echo "🚨 PROBLEM: Prediction exists but NO results!"
                NO_RESULTS_DATES="${NO_RESULTS_DATES}${DATE}, "
                NO_RESULTS_ALERT=true
              fi
            fi
          done

          if [ "$ALERT_NEEDED" = true ]; then
            echo "alert_needed=true" >> $GITHUB_OUTPUT
            echo "missing_dates=${MISSING_DATES%, }" >> $GITHUB_OUTPUT
          else
            echo "alert_needed=false" >> $GITHUB_OUTPUT
          fi

          if [ "$NO_RESULTS_ALERT" = true ]; then
            echo "no_results_alert=true" >> $GITHUB_OUTPUT
            echo "no_results_dates=${NO_RESULTS_DATES%, }" >> $GITHUB_OUTPUT
            echo ""
            echo "🚨 ALERT: Dates with predictions but NO results!"
            echo "   $NO_RESULTS_DATES"
          else
            echo "no_results_alert=false" >> $GITHUB_OUTPUT
          fi

          if [ "$ALERT_NEEDED" = false ] && [ "$NO_RESULTS_ALERT" = false ]; then
            echo ""
            echo "✅ All dates synchronized"
          fi

      - name: Check Nankan archive sync
        id: check-nankan
        run: |
          # 過去7日間の日付をチェック
          MISSING_DATES=""
          NO_RESULTS_DATES=""
          ALERT_NEEDED=false
          NO_RESULTS_ALERT=false

          for i in {0..6}; do
            DATE=$(date -u -d "$i days ago" +%Y-%m-%d 2>/dev/null || date -u -v-${i}d +%Y-%m-%d)
            YEAR=${DATE:0:4}
            MONTH=${DATE:5:2}

            echo "━━━ Checking: $DATE ━━━"

            # 予想データがあるかチェック
            PREDICTION_URL="https://raw.githubusercontent.com/apol0510/keiba-data-shared/main/nankan/predictions/$YEAR/$MONTH/$DATE.json"
            HAS_PREDICTION=false

            if curl -sf "$PREDICTION_URL" > /dev/null; then
              echo "✅ Prediction: Found"
              HAS_PREDICTION=true
            else
              echo "⏭️  Prediction: Not found"
            fi

            # 結果データがあるかチェック
            RESULT_URL="https://raw.githubusercontent.com/apol0510/keiba-data-shared/main/nankan/results/$YEAR/$MONTH/$DATE.json"

            if curl -sf "$RESULT_URL" > /tmp/result.json; then
              RACE_COUNT=$(cat /tmp/result.json | jq -r '.races | length')
              echo "✅ Results: $RACE_COUNT races"

              # 12レース揃っている場合のみチェック
              if [ "$RACE_COUNT" -ge 12 ]; then
                # keiba-intelligenceのアーカイブにあるかチェック
                if grep -q "\"date\": \"$DATE\"" astro-site/src/data/archiveResults.json; then
                  echo "✅ Archive: Found"
                else
                  echo "❌ Archive: MISSING!"
                  MISSING_DATES="${MISSING_DATES}${DATE} (${RACE_COUNT}R), "
                  ALERT_NEEDED=true
                fi
              else
                echo "⏭️  Skipped: $RACE_COUNT races (< 12)"
              fi
            else
              echo "⏭️  Results: Not found"

              # 予想データがあるのに結果データがない → アラート
              if [ "$HAS_PREDICTION" = true ]; then
                echo "🚨 PROBLEM: Prediction exists but NO results!"
                NO_RESULTS_DATES="${NO_RESULTS_DATES}${DATE}, "
                NO_RESULTS_ALERT=true
              fi
            fi
          done

          if [ "$ALERT_NEEDED" = true ]; then
            echo "alert_needed=true" >> $GITHUB_OUTPUT
            echo "missing_dates=${MISSING_DATES%, }" >> $GITHUB_OUTPUT
          else
            echo "alert_needed=false" >> $GITHUB_OUTPUT
          fi

          if [ "$NO_RESULTS_ALERT" = true ]; then
            echo "no_results_alert=true" >> $GITHUB_OUTPUT
            echo "no_results_dates=${NO_RESULTS_DATES%, }" >> $GITHUB_OUTPUT
            echo ""
            echo "🚨 ALERT: Dates with predictions but NO results!"
            echo "   $NO_RESULTS_DATES"
          else
            echo "no_results_alert=false" >> $GITHUB_OUTPUT
          fi

          if [ "$ALERT_NEEDED" = false ] && [ "$NO_RESULTS_ALERT" = false ]; then
            echo ""
            echo "✅ All dates synchronized"
          fi

      - name: Send alert email (JRA)
        if: steps.check-jra.outputs.alert_needed == 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          EMAIL_SUBJECT: '🚨 JRA結果アーカイブ未反映検出 - keiba-intelligence'
          EMAIL_BODY: |
            マコさん、

            JRA結果データがkeiba-intelligenceのアーカイブに反映されていません。

            【未反映の日付】
            ${{ steps.check-jra.outputs.missing_dates }}

            【確認事項】
            1. keiba-data-sharedには結果データが存在します
            2. しかし、keiba-intelligenceのアーカイブに反映されていません

            【手動実行コマンド】
            cd /Users/apolon/Projects/keiba-intelligence
            gh workflow run import-results-jra.yml -f date=YYYY-MM-DD

            または、以下のURLから手動実行：
            https://github.com/apol0510/keiba-intelligence/actions/workflows/import-results-jra.yml

            【GitHub Actionsログ】
            https://github.com/apol0510/keiba-intelligence/actions

            ---
            このメールは自動送信されています。
            ワークフロー: verify-archive-sync.yml
        run: node .github/scripts/send-alert-email.js

      - name: Send alert email (JRA - No Results)
        if: steps.check-jra.outputs.no_results_alert == 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          EMAIL_SUBJECT: '🚨🚨 JRA結果データ未登録検出 - keiba-data-shared'
          EMAIL_BODY: |
            マコさん、

            JRA予想データは存在しますが、結果データがkeiba-data-sharedに登録されていません。

            【結果データが未登録の日付】
            ${{ steps.check-jra.outputs.no_results_dates }}

            【確認事項】
            1. keiba-data-sharedに予想データは存在します
            2. しかし、結果データが登録されていません

            【対応方法】
            1. 結果データをkeiba-data-sharedに登録してください
            2. 結果データのファイルパス:
               keiba-data-shared/jra/results/YYYY/MM/YYYY-MM-DD.json

            【keiba-data-sharedリポジトリ】
            https://github.com/apol0510/keiba-data-shared

            ---
            このメールは自動送信されています。
            ワークフロー: verify-archive-sync.yml
        run: node .github/scripts/send-alert-email.js

      - name: Send alert email (Nankan)
        if: steps.check-nankan.outputs.alert_needed == 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          EMAIL_SUBJECT: '🚨 南関結果アーカイブ未反映検出 - keiba-intelligence'
          EMAIL_BODY: |
            マコさん、

            南関結果データがkeiba-intelligenceのアーカイブに反映されていません。

            【未反映の日付】
            ${{ steps.check-nankan.outputs.missing_dates }}

            【確認事項】
            1. keiba-data-sharedには結果データが存在します（12レース揃い）
            2. しかし、keiba-intelligenceのアーカイブに反映されていません

            【手動実行コマンド】
            cd /Users/apolon/Projects/keiba-intelligence
            gh workflow run import-results-on-dispatch.yml -f date=YYYY-MM-DD

            または、以下のURLから手動実行：
            https://github.com/apol0510/keiba-intelligence/actions/workflows/import-results-on-dispatch.yml

            【GitHub Actionsログ】
            https://github.com/apol0510/keiba-intelligence/actions

            ---
            このメールは自動送信されています。
            ワークフロー: verify-archive-sync.yml
        run: node .github/scripts/send-alert-email.js

      - name: Send alert email (Nankan - No Results)
        if: steps.check-nankan.outputs.no_results_alert == 'true'
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          EMAIL_SUBJECT: '🚨🚨 南関結果データ未登録検出 - keiba-data-shared'
          EMAIL_BODY: |
            マコさん、

            南関予想データは存在しますが、結果データがkeiba-data-sharedに登録されていません。

            【結果データが未登録の日付】
            ${{ steps.check-nankan.outputs.no_results_dates }}

            【確認事項】
            1. keiba-data-sharedに予想データは存在します
            2. しかし、結果データが登録されていません

            【対応方法】
            1. 結果データをkeiba-data-sharedに登録してください
            2. 結果データのファイルパス:
               keiba-data-shared/nankan/results/YYYY/MM/YYYY-MM-DD.json

            【keiba-data-sharedリポジトリ】
            https://github.com/apol0510/keiba-data-shared

            ---
            このメールは自動送信されています。
            ワークフロー: verify-archive-sync.yml
        run: node .github/scripts/send-alert-email.js

      - name: Success notification
        if: steps.check-jra.outputs.alert_needed != 'true' && steps.check-nankan.outputs.alert_needed != 'true'
        run: |
          echo "✅ All archives synchronized (past 7 days)"
          echo "   JRA: OK"
          echo "   Nankan: OK"
          echo "   No alerts sent"
